server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    types {
        text/plain               asc gpg Release Packages InRelease;
        application/gzip         gz;
        application/octet-stream deb;
    }

    location ~* \.(gz|Packages|Release|InRelease)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
