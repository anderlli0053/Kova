server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }

    types {
        application/xml          xml;
        application/octet-stream rpm;
        text/plain               asc repo;
    }

    location ~* \.(xml|xml\.gz|sqlite\.bz2)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
