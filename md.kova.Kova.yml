app-id: md.kova.Kova
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node24
command: kova

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node24/bin
  env:
    CARGO_HOME: /run/build/kova/cargo
    npm_config_cache: /run/build/kova/flatpak-node/npm-cache

modules:
  - name: kova
    buildsystem: simple
    build-commands:
      # Build the Vite/React frontend
      - npm ci --offline
      - npm run build

      # Build the Tauri binary with the flatpak feature so the self-updater
      # plugin is disabled (Flatpak manages updates itself).
      - cargo build --release --features flatpak,custom-protocol --manifest-path src-tauri/Cargo.toml

      # Install binary and desktop integration files
      - install -Dm755 src-tauri/target/release/kova /app/bin/kova-bin
      - install -Dm755 flatpak/kova.sh /app/bin/kova
      - install -Dm644 flatpak/md.kova.Kova.desktop
          /app/share/applications/md.kova.Kova.desktop
      - install -Dm644 flatpak/md.kova.Kova.metainfo.xml
          /app/share/metainfo/md.kova.Kova.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png
          /app/share/icons/hicolor/32x32/apps/md.kova.Kova.png
      - install -Dm644 src-tauri/icons/64x64.png
          /app/share/icons/hicolor/64x64/apps/md.kova.Kova.png
      - install -Dm644 src-tauri/icons/128x128.png
          /app/share/icons/hicolor/128x128/apps/md.kova.Kova.png
      - install -Dm644 src-tauri/icons/128x128@2x.png
          /app/share/icons/hicolor/256x256/apps/md.kova.Kova.png

    sources:
      # LOCAL TESTING: use the dir source below. Comment it out and uncomment
      # the git source when submitting to Flathub.
      - type: dir
        path: .

      # FLATHUB SUBMISSION: uncomment and fill in tag/commit before submitting.
      # The update-flathub.yml workflow keeps these up to date automatically.
      # - type: git
      #   url: https://github.com/KovaMD/Kova
      #   tag: v0.2.8
      #   commit: COMMIT_SHA_PLACEHOLDER

      # Generated by scripts/generate-flatpak-sources.sh — re-run whenever
      # Cargo.lock or package-lock.json changes.
      - flatpak/cargo-sources.json
      - flatpak/node-sources.json
