name: Release

# Triggers on version tags (e.g. v0.1.0-alpha.1) or a manual run from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # Creates the draft release before any platform build starts.  Without this,
  # all three platform jobs race to create the release simultaneously and the
  # losers' assets are silently dropped.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if a release already exists (re-run or workflow_dispatch reuse).
          gh release view "${{ github.ref_name }}" -R "${{ github.repository }}" \
            --json id 2>/dev/null && exit 0

          cat > /tmp/release-notes.md << 'NOTES'
          ## What's new

          ### New features
          - **Callout / admonition blocks** — Obsidian/GitHub-style `[!note]`, `[!warning]`, etc. blocks for calling out important content, extendable via CSS (requested by @codingThome, #120).
          - **Self-hosted Flatpak packaging** — signed, GPG-verified Flatpak release published to `flatpak.kova.md` alongside the existing deb/rpm repos (by @vadika, #123; addresses #9).
          - **Release binary attestation** — published macOS/Windows/Linux binaries are now attested to the commit and build that produced them; see the new `SECURITY.md` for how to verify a download and how to report a vulnerability (by @vadika, #124; addresses #121, reported by @a1880).
          - **German translation** — Kova is now available in German (contributed by @a1880).
          - **Locale-aware fallback date** — the `{date}` shown when a deck has no `date:` frontmatter now follows the field order (day/month/year vs. month/day/year) of the app's selected display language instead of always showing ISO `YYYY-MM-DD` (addresses #55, reported by @a1880).

          ### Bug fixes
          - **Fixed Table of Contents numbering restarting at 1** in the second column of a split ToC, misaligned numbers on wrapped entries, and the "rescaled to fit" badge incorrectly showing during a live presentation (reported by @a1880, #127).
          - **Finished translating the native macOS menu bar** (File/Edit/Present/View) and fixed the in-window toolbar and menus always showing English regardless of the selected display language.
          - **Fixed several Slovenian translation gaps** introduced by the v0.6.12 i18n migration — missing plural forms for counts of 2–4, a zero-count ("Est. 0 min") falling back to the wrong grammatical form, and the audience/secondary-monitor window ignoring the chosen display language.
          - **Fixed the presenter/audience date and title going out of sync** and PPTX exports leaving `{date}` blank when a deck had no frontmatter date.
          - **Fixed slide-jump keystrokes being dropped intermittently** during dual/mirror presentation mode.
          - **Fixed text/chart slides being vertically centered** instead of top-aligned like other layouts.

          ---

          ## Installation

          | Platform | Download | Note |
          |---|---|---|
          | **macOS** (Apple Silicon + Intel) | `.dmg` | Signed and notarised — double-click to install |
          | **Windows 10/11** | `.msi` or `_x64-setup.exe` | Click **More info → Run anyway** if SmartScreen appears (app is unsigned) |
          | **Linux** | `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL/openSUSE), or `.flatpakref` | Install via your package manager |
          | **Linux AppImage** | `.AppImage` | Graphics libs stripped for compatibility with Arch/Fedora/etc. Supports auto-update. |

          > **Beta release** — expect rough edges. Please report bugs via [Issues](../../issues).
          NOTES

          gh release create "${{ github.ref_name }}" \
            -R "${{ github.repository }}" \
            --draft \
            --title "Kova ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

  release:
    needs: [create-release]
    permissions:
      contents: write   # needed to create the GitHub release and upload assets

    strategy:
      fail-fast: false  # keep building other platforms even if one fails
      matrix:
        include:

          # macOS — universal binary runs on both Intel and Apple Silicon
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin

          # Linux — .deb and .rpm via tauri-action; AppImage is built and
          # signed separately below (see "Build, sign, and upload AppImage"),
          # since it needs post-build stripping/repacking (issue #3) that
          # tauri-action's own build+sign pipeline can't do in between.
          - platform: ubuntu-22.04
            args: '--bundles deb,rpm'
            rust_targets: ''

          # Windows 10/11
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of 2026-05-15
        with:
          toolchain: stable
          targets: ${{ matrix.rust_targets }}

      # Rust build cache — dramatically speeds up subsequent runs
      - name: Cache Rust build artefacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Required system libraries for WebKitGTK on Linux
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Write the App Store Connect API key to disk for the post-build notarisation step.
      # The tr -d '\r' strips Windows CRLF endings that corrupt the PEM format.
      - name: Write App Store Connect API key
        if: matrix.platform == 'macos-latest'
        run: printf '%s' "$APPLE_API_KEY_CONTENT" | tr -d '\r' > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      # Tauri handles signing; notarisation is done in a separate step below to
      # work around a Tauri v2 bug where the notarytool call fails silently.
      - name: Build and publish release (signing only)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Tauri updater — signs .sig files and generates latest.json
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kova ${{ github.ref_name }}'
          releaseDraft: true    # appears as a draft; publish manually after reviewing the assets
          prerelease: false
          args: ${{ matrix.args }}

      # Builds and signs the AppImage, then patches this platform's latest.json
      # (already written to the repo root by the step above) before it gets
      # copied into the cross-platform-merge artifact below — so the fix
      # lands without adding any new race condition.
      #
      # linuxdeploy bundles libwayland-* (built on ubuntu-22.04). The host's
      # Mesa libEGL then loads those stale bundled wayland libs, breaking the
      # Wayland-EGL handshake → "EGL_BAD_PARAMETER. Aborting..." (issue #3,
      # confirmed fixed on Arch by @vadika). Strip them so the AppImage uses
      # host libs, then sign the repacked bytes directly — stripping
      # invalidates whatever signature Tauri would have computed at build
      # time, so createUpdaterArtifacts:false skips generating one to begin
      # with. Proven end-to-end (real self-update, download→verify→install→
      # relaunch) via linux-test-build.yml on 2026-07-03.
      - name: Build, sign, and upload AppImage
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          npm run tauri build -- --bundles appimage --config '{"bundle":{"createUpdaterArtifacts":false}}'
          APPIMAGE_DIR="src-tauri/target/release/bundle/appimage"
          APP=$(ls "$APPIMAGE_DIR"/*.AppImage | head -1)
          APP_NAME=$(basename "$APP")

          ( cd "$APPIMAGE_DIR"
            ./"$APP_NAME" --appimage-extract >/dev/null
            cd squashfs-root/usr/lib && rm -f \
              libwayland-client.so* libwayland-cursor.so* libwayland-egl.so* libwayland-server.so* \
              libEGL.so* libGL.so* libGLX.so* libGLdispatch.so* libOpenGL.so* \
              libGLESv2.so* libgbm.so* libdrm.so* libEGL_mesa.so* libgallium*.so* \
              && rm -rf dri/ )

          wget -qO /tmp/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          rm -f "$APP"
          ( cd "$APPIMAGE_DIR" && ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool squashfs-root "$APP_NAME" )
          rm -rf "$APPIMAGE_DIR/squashfs-root"

          # Sign the final (post-strip) bytes directly. tauri-cli's "*.sig"
          # file content is already the final base64 string latest.json
          # expects — re-encoding it (e.g. base64 -w 0 < file.sig) would
          # double-encode and produce a signature that fails verification.
          npm install -g @tauri-apps/cli@^2
          tauri signer sign "$APP"
          SIG=$(cat "$APP.sig")

          gh release upload "${{ github.ref_name }}" "$APP" --clobber

          # tauri-action's deb/rpm build already populated latest.json's
          # linux-x86_64 entry pointing at the .deb — Tauri's updater only
          # supports AppImage on Linux, so that entry was never actually
          # usable. Overwrite it with the signed AppImage instead.
          jq --arg sig "$SIG" \
             --arg url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ github.ref_name }}/$APP_NAME" \
             '.platforms["linux-x86_64"] = {signature: $sig, url: $url}' \
             latest.json > /tmp/latest.json.new
          mv /tmp/latest.json.new latest.json

      # Save this platform's latest.json as a workflow artifact so the finalize
      # job can merge all three into one before uploading to the release.
      # Without this, each platform overwrites the shared latest.json in the
      # release, and whichever platform finishes last wins — dropping the others.
      # tauri-action writes latest.json to the project root (process.cwd()),
      # not under src-tauri/target — it's generated in the action's Node
      # process and only ever touches the bundle dir for the .sig files.
      - name: Save platform latest.json artifact
        shell: bash
        run: |
          LATEST="latest.json"
          if [ ! -f "$LATEST" ]; then
            echo "latest.json not found — skipping artifact upload"
            exit 0
          fi
          mkdir -p /tmp/platform-latest
          cp "$LATEST" /tmp/platform-latest/latest.json
          echo "Found: $LATEST"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: latest-json-${{ matrix.platform }}
          path: /tmp/platform-latest/latest.json
          if-no-files-found: warn

      # Submit the signed DMG to Apple, then wait up to 10 minutes for acceptance,
      # and staple the notarisation ticket so Gatekeeper works offline.
      - name: Notarise and staple macOS DMG
        if: matrix.platform == 'macos-latest'
        run: |
          DMG=$(find "$(pwd)/src-tauri/target/universal-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)
          echo "Submitting: $DMG"

          # Submit without --wait so we capture the submission ID immediately
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json 2>&1 | tee /tmp/submit.json
          SUBMISSION_ID=$(jq -r '.id' /tmp/submit.json)
          echo "Submission ID: $SUBMISSION_ID"

          # No timeout — Apple can take significantly longer on first submission
          # with a new Developer ID cert. Subsequent submissions will be 1-3 min.
          xcrun notarytool wait "$SUBMISSION_ID" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json 2>&1 | tee /tmp/wait.json
          cat /tmp/wait.json

          STATUS=$(jq -r '.status' /tmp/wait.json)
          echo "Notarisation status: $STATUS"
          [ "$STATUS" = "Accepted" ] || { echo "Notarisation rejected"; exit 1; }

          xcrun stapler staple "$DMG"
          echo "Ticket stapled to $DMG"
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Replace the unnotarised DMG already uploaded by tauri-action with the
      # stapled copy. Only runs on real tag pushes, not workflow_dispatch tests.
      - name: Replace DMG in release with notarised copy
        if: matrix.platform == 'macos-latest' && github.event_name == 'push'
        run: |
          DMG=$(find "$(pwd)/src-tauri/target/universal-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create a plain tar.gz with the binary + desktop entry + icons for AUR and
      # direct installs that don't want a package manager bundle.
      - name: Package Linux tar.gz
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          OUTNAME="Kova_${VERSION}_x86_64.tar.gz"
          mkdir -p /tmp/kova/icons
          cp src-tauri/target/release/kova   /tmp/kova/
          cp src-tauri/kova.desktop          /tmp/kova/
          cp src-tauri/icons/32x32.png       /tmp/kova/icons/
          cp src-tauri/icons/64x64.png       /tmp/kova/icons/
          cp src-tauri/icons/128x128.png     /tmp/kova/icons/
          cp src-tauri/icons/128x128@2x.png  /tmp/kova/icons/
          cp LICENSE                         /tmp/kova/
          tar -czf "$OUTNAME" -C /tmp kova
          gh release upload "${{ github.ref_name }}" "$OUTNAME" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs after all platform builds. Adds stable-named (version-free) download
  # aliases so README links never need updating, then removes .sig files to
  # keep the release page clean for non-technical users.
  finalize:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write        # provenance signing (OIDC)
      attestations: write    # write the attestation
    steps:
      - name: Download per-platform latest.json artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: latest-json-*
          path: /tmp/platform-latest-jsons

      - name: Merge latest.json across all platforms
        run: |
          set -euo pipefail
          # Combine the "platforms" objects from all per-platform latest.json files
          # into a single merged latest.json, then upload it to the release.
          mkdir -p /tmp/platform-latest-jsons
          mapfile -t JSON_FILES < <(find /tmp/platform-latest-jsons -name "latest.json")
          if [ "${#JSON_FILES[@]}" -eq 0 ]; then
            echo "::error::No per-platform latest.json artifacts were downloaded — nothing to merge." >&2
            exit 1
          fi
          printf '%s\n' "${JSON_FILES[@]}" | xargs jq -sc '
                .[0] as $base |
                { version: $base.version, notes: $base.notes, pub_date: $base.pub_date,
                  platforms: (reduce .[].platforms as $p ({}; . * $p)) }
              ' > /tmp/latest.json
          echo "Merged platforms:" && jq '.platforms | keys' /tmp/latest.json
          gh release upload "${{ github.ref_name }}" /tmp/latest.json \
            -R KovaMD/Kova --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add stable download aliases and remove .sig files
        id: aliases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          mkdir /tmp/assets

          gh release download "$TAG" -R KovaMD/Kova \
            -p "*.dmg" -p "*_en-US.msi" -p "*-setup.exe" \
            -p "*.deb" -p "*.rpm" -p "*_x86_64.tar.gz" -p "*_amd64.AppImage" \
            -D /tmp/assets --clobber

          # One source of truth (stable alias -> version-named original). cp,
          # upload, and the attest subject-path below all read this map, so a new
          # alias can't ship unattested.
          declare -A ALIAS=(
            [Kova_macOS.dmg]="Kova_${VERSION}_universal.dmg"
            [Kova_Windows.msi]="Kova_${VERSION}_x64_en-US.msi"
            [Kova_Windows_setup.exe]="Kova_${VERSION}_x64-setup.exe"
            [Kova_Linux.deb]="Kova_${VERSION}_amd64.deb"
            [Kova_Linux.rpm]="Kova-${VERSION}-1.x86_64.rpm"
            [Kova_Linux.tar.gz]="Kova_${VERSION}_x86_64.tar.gz"
            [Kova_Linux.AppImage]="Kova_${VERSION}_amd64.AppImage"
          )
          PATHS=()
          for a in "${!ALIAS[@]}"; do
            cp "/tmp/assets/${ALIAS[$a]}" "/tmp/assets/$a"
            PATHS+=("/tmp/assets/$a")
          done

          gh release upload "$TAG" -R KovaMD/Kova "${PATHS[@]}" --clobber
          { echo 'paths<<EOF'; printf '%s\n' "${PATHS[@]}"; echo 'EOF'; } >> "$GITHUB_OUTPUT"

          # Remove .sig files — signatures are embedded in latest.json.
          gh release view "$TAG" -R KovaMD/Kova --json assets \
            --jq '.assets[] | select(.name | endswith(".sig")) | .name' \
            | xargs -r -I{} gh release delete-asset "$TAG" {} -R KovaMD/Kova --yes

      # Cryptographic provenance tying each release binary to this commit + run.
      # Users verify with: gh attestation verify <file> --repo KovaMD/Kova.
      # !cancelled() so a flaky .sig cleanup above can't skip attestation.
      - name: Attest build provenance for release binaries
        if: ${{ !cancelled() }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.aliases.outputs.paths }}
