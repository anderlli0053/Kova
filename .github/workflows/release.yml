name: Release

# Triggers on version tags (e.g. v0.1.0-alpha.1) or a manual run from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write   # needed to create the GitHub release and upload assets

    strategy:
      fail-fast: false  # keep building other platforms even if one fails
      matrix:
        include:

          # macOS — universal binary runs on both Intel and Apple Silicon
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin

          # Linux — .deb and .rpm packages
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''

          # Windows 10/11
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of 2026-05-15
        with:
          toolchain: stable
          targets: ${{ matrix.rust_targets }}

      # Rust build cache — dramatically speeds up subsequent runs
      - name: Cache Rust build artefacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Required system libraries for WebKitGTK on Linux
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Write the App Store Connect API key to disk for the post-build notarisation step.
      # The tr -d '\r' strips Windows CRLF endings that corrupt the PEM format.
      - name: Write App Store Connect API key
        if: matrix.platform == 'macos-latest'
        run: printf '%s' "$APPLE_API_KEY_CONTENT" | tr -d '\r' > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      # Tauri handles signing; notarisation is done in a separate step below to
      # work around a Tauri v2 bug where the notarytool call fails silently.
      - name: Build and publish release (signing only)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Tauri updater — signs .sig files and generates latest.json
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Exclude webkit2gtk from the AppImage bundle so the AppImage uses the
          # host system's webkit2gtk instead. Bundling webkit compiled on Ubuntu
          # 22.04 causes EGL_BAD_PARAMETER crashes on other distros (Fedora, Arch,
          # etc.) because the bundled binary conflicts with the host's Mesa/EGL
          # stack. The AppImage requires webkit2gtk-4.1 to be installed on the
          # host (standard on all major desktop Linux distributions).
          # See: https://github.com/tauri-apps/tauri/issues/11790
          LINUXDEPLOY_EXCLUDE_LIBS: libwebkit2gtk-4.1.so.0:libjavascriptcoregtk-4.1.so.0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kova ${{ github.ref_name }}'
          releaseBody: |
            ## What's new

            ### New
            - **Focus mode button in the toolbar** — focus mode is now accessible directly from the titlebar, between the Present button and the Inspector toggle. The icon glows accent-coloured when active so the current state is always obvious at a glance. The keyboard shortcut (`Ctrl+Shift+F`) still works as before.

            ### Bug fixes
            - **Fixed file open and save on Windows for non-standard paths** — the home-directory sandbox that restricted file access was originally added for Linux Flatpak and should never have applied to Windows or macOS. Users whose files live outside the standard home directory (e.g. `C:\ak\...`) can now open and save files normally. Thanks @a1880 for the report (#10).
            - **Fixed logo not rendering on Windows** — paths returned by the file dialog use backslashes, which were being URL-encoded rather than converted to forward slashes before being passed to the asset protocol, producing a URL the handler could not resolve. Thanks @a1880 (#12).
            - **Fixed header and footer being lost when switching themes** — changing the active theme was clearing all overrides including user-configured header and footer text. These values are now preserved across theme switches. Thanks @a1880 (#11).
            - **Fixed paste failing for large text at the end of the document on Windows** — the paste handler was reading the cursor position after an async clipboard read. On Windows, reading a large clipboard payload is slow enough that the editor state can shift during the wait, making the position invalid. CodeMirror silently rejects out-of-range dispatches. Cursor position is now captured before the async call. Thanks @Sl-Alex (#13).
            - **Speaker notes now included in PPTX export** — notes written below `???` on a slide were parsed and shown in presenter view but were never written into the exported `.pptx` file. They now appear in PowerPoint's Notes pane. Thanks @Benjoyo (#14).
            - **Title + Image slide layout now stacks vertically** — title sits above the image rather than side by side.

            ---

            ## Installation

            | Platform | Download | Note |
            |---|---|---|
            | **macOS** (Apple Silicon + Intel) | `.dmg` | Signed and notarised — double-click to install |
            | **Windows 10/11** | `.msi` or `_x64-setup.exe` | Click **More info → Run anyway** if SmartScreen appears (app is unsigned) |
            | **Linux** | `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL/openSUSE), or `.AppImage` | Install via your package manager, or `chmod +x` the AppImage and run directly |

            > **Beta release** — expect rough edges. Please report bugs via [Issues](../../issues).
          releaseDraft: true    # appears as a draft; publish manually after reviewing the assets
          prerelease: false
          args: ${{ matrix.args }}

      # Submit the signed DMG to Apple, then wait up to 10 minutes for acceptance,
      # and staple the notarisation ticket so Gatekeeper works offline.
      - name: Notarise and staple macOS DMG
        if: matrix.platform == 'macos-latest'
        run: |
          DMG=$(find "$(pwd)/src-tauri/target/universal-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)
          echo "Submitting: $DMG"

          # Submit without --wait so we capture the submission ID immediately
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json 2>&1 | tee /tmp/submit.json
          SUBMISSION_ID=$(jq -r '.id' /tmp/submit.json)
          echo "Submission ID: $SUBMISSION_ID"

          # No timeout — Apple can take significantly longer on first submission
          # with a new Developer ID cert. Subsequent submissions will be 1-3 min.
          xcrun notarytool wait "$SUBMISSION_ID" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json 2>&1 | tee /tmp/wait.json
          cat /tmp/wait.json

          STATUS=$(jq -r '.status' /tmp/wait.json)
          echo "Notarisation status: $STATUS"
          [ "$STATUS" = "Accepted" ] || { echo "Notarisation rejected"; exit 1; }

          xcrun stapler staple "$DMG"
          echo "Ticket stapled to $DMG"
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Replace the unnotarised DMG already uploaded by tauri-action with the
      # stapled copy. Only runs on real tag pushes, not workflow_dispatch tests.
      - name: Replace DMG in release with notarised copy
        if: matrix.platform == 'macos-latest' && github.event_name == 'push'
        run: |
          DMG=$(find "$(pwd)/src-tauri/target/universal-apple-darwin/release/bundle/dmg" -name "*.dmg" | head -1)
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create a plain tar.gz with the binary + desktop entry + icons for AUR and
      # direct installs that don't want a package manager bundle.
      - name: Package Linux tar.gz
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          OUTNAME="Kova_${VERSION}_x86_64.tar.gz"
          mkdir -p /tmp/kova/icons
          cp src-tauri/target/release/kova   /tmp/kova/
          cp src-tauri/kova.desktop          /tmp/kova/
          cp src-tauri/icons/32x32.png       /tmp/kova/icons/
          cp src-tauri/icons/64x64.png       /tmp/kova/icons/
          cp src-tauri/icons/128x128.png     /tmp/kova/icons/
          cp src-tauri/icons/128x128@2x.png  /tmp/kova/icons/
          cp LICENSE                         /tmp/kova/
          tar -czf "$OUTNAME" -C /tmp kova
          gh release upload "${{ github.ref_name }}" "$OUTNAME" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs after all platform builds. Adds stable-named (version-free) download
  # aliases so README links never need updating, then removes .sig files to
  # keep the release page clean for non-technical users.
  finalize:
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Add stable download aliases and remove .sig files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          mkdir /tmp/assets

          gh release download "$TAG" -R KovaMD/Kova \
            -p "*.dmg" -p "*_en-US.msi" -p "*-setup.exe" \
            -p "*.deb" -p "*.rpm" -p "*.AppImage" -p "*_x86_64.tar.gz" \
            -D /tmp/assets --clobber

          cp "/tmp/assets/Kova_${VERSION}_universal.dmg"        "/tmp/assets/Kova_macOS.dmg"
          cp "/tmp/assets/Kova_${VERSION}_x64_en-US.msi"        "/tmp/assets/Kova_Windows.msi"
          cp "/tmp/assets/Kova_${VERSION}_x64-setup.exe"        "/tmp/assets/Kova_Windows_setup.exe"
          cp "/tmp/assets/Kova_${VERSION}_amd64.deb"            "/tmp/assets/Kova_Linux.deb"
          cp "/tmp/assets/Kova-${VERSION}-1.x86_64.rpm"         "/tmp/assets/Kova_Linux.rpm"
          cp "/tmp/assets/Kova_${VERSION}_amd64.AppImage"       "/tmp/assets/Kova_Linux.AppImage"
          cp "/tmp/assets/Kova_${VERSION}_x86_64.tar.gz"        "/tmp/assets/Kova_Linux.tar.gz"

          gh release upload "$TAG" -R KovaMD/Kova \
            /tmp/assets/Kova_macOS.dmg \
            /tmp/assets/Kova_Windows.msi \
            /tmp/assets/Kova_Windows_setup.exe \
            /tmp/assets/Kova_Linux.deb \
            /tmp/assets/Kova_Linux.rpm \
            /tmp/assets/Kova_Linux.AppImage \
            /tmp/assets/Kova_Linux.tar.gz \
            --clobber

          # Remove .sig files — signatures are embedded in latest.json
          gh release view "$TAG" -R KovaMD/Kova --json assets \
            --jq '.assets[] | select(.name | endswith(".sig")) | .name' \
            | xargs -I{} gh release delete-asset "$TAG" {} -R KovaMD/Kova --yes
