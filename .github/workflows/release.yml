name: Release

# Triggers on version tags (e.g. v0.1.0-alpha.1) or a manual run from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write   # needed to create the GitHub release and upload assets

    strategy:
      fail-fast: false  # keep building other platforms even if one fails
      matrix:
        include:

          # macOS — universal binary runs on both Intel and Apple Silicon
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin

          # Linux — AppImage (most portable for alpha/testing)
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''

          # Windows 10/11
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Rust build cache — dramatically speeds up subsequent runs
      - name: Cache Rust build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Required system libraries for WebKitGTK on Linux
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Write the App Store Connect API key to disk for the post-build notarisation step.
      # The tr -d '\r' strips Windows CRLF endings that corrupt the PEM format.
      - name: Write App Store Connect API key
        if: matrix.platform == 'macos-latest'
        run: printf '%s' "$APPLE_API_KEY_CONTENT" | tr -d '\r' > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

      # Tauri handles signing; notarisation is done in a separate step below to
      # work around a Tauri v2 bug where the notarytool call fails silently.
      - name: Build and publish release (signing only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kova ${{ github.ref_name }}'
          releaseBody: |
            ## Installation

            | Platform | Download | First-launch note |
            |---|---|---|
            | **macOS** (Apple Silicon + Intel) | `.dmg` | Double-click to install — app is signed and notarised |
            | **Windows 10/11** | `.msi` or `_x64-setup.exe` | Click **More info → Run anyway** if SmartScreen appears (app is unsigned) |
            | **Linux** | `.AppImage` | `chmod +x kova_*.AppImage && ./kova_*.AppImage` |

            > **Alpha release** — expect rough edges. Please report bugs via [Issues](../../issues).
          releaseDraft: true    # appears as a draft; publish manually after reviewing the assets
          prerelease: true
          args: ${{ matrix.args }}

      # Submit the signed DMG to Apple, wait for acceptance, then staple the
      # notarisation ticket so the app passes Gatekeeper without internet access.
      - name: Notarise and staple macOS DMG
        if: matrix.platform == 'macos-latest'
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          echo "DMG: $DMG"
          ls -lh "$DMG"
          echo "Key file: $(wc -c < "$RUNNER_TEMP/AuthKey.p8") bytes, $(wc -l < "$RUNNER_TEMP/AuthKey.p8") lines"
          echo "APPLE_API_KEY length: ${#APPLE_API_KEY} (expect 10)"
          echo "APPLE_API_ISSUER length: ${#APPLE_API_ISSUER} (expect 36)"

          set +e
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait \
            --output-format json \
            > /tmp/notarize-out.txt 2>/tmp/notarize-err.txt
          NOTARIZE_EXIT=$?
          set -e

          echo "=== notarytool exit code: $NOTARIZE_EXIT ==="
          echo "=== stdout ($(wc -c < /tmp/notarize-out.txt) bytes) ==="
          cat /tmp/notarize-out.txt
          echo "=== stderr ($(wc -c < /tmp/notarize-err.txt) bytes) ==="
          cat /tmp/notarize-err.txt

          STATUS=$(jq -r '.status // empty' /tmp/notarize-out.txt 2>/dev/null || echo "")
          echo "Notarisation status: $STATUS"
          [ "$STATUS" = "Accepted" ] || { echo "Notarisation failed"; exit 1; }
          xcrun stapler staple "$DMG"
          echo "Ticket stapled to $DMG"
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # Replace the unnotarised DMG already uploaded by tauri-action with the
      # stapled copy. Only runs on real tag pushes, not workflow_dispatch tests.
      - name: Replace DMG in release with notarised copy
        if: matrix.platform == 'macos-latest' && github.event_name == 'push'
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
