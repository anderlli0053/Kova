name: Linux Test Build

# Manually-triggered Linux-only build for sharing pre-release AppImages with
# issue reporters before a full release. Publishes as a pre-release so the
# download URL can be pasted directly into a GitHub issue.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Pre-release tag (e.g. v0.6.5-test.1)'
        required: true
        default: 'v0.6.5-test.1'
      version_override:
        description: 'Override app version for this build (e.g. 0.6.999). Leave empty to use the real project version. Publishing a higher override to an existing tag lets an already-running test build detect it as an update.'
        required: false
        default: ''

jobs:
  linux-test-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of 2026-05-15
        with:
          toolchain: stable

      - name: Cache Rust build artefacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ubuntu-22.04-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-22.04-cargo-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Throwaway test build — skip updater artifacts so no minisign signing
      # key is needed for the deb/rpm bundles (the AppImage is signed
      # separately below). version_override lets a repeat run publish a
      # "new" higher version to the same tag, to test self-update against
      # an already-running "old" build.
      #
      # version_override patches tauri.conf.json's version *on disk* rather
      # than via --config: tauri::generate_context!() is a compile-time proc
      # macro that reads the literal file, so a --config CLI override only
      # changes the post-compile bundler/manifest metadata (bundle filename,
      # latest.json) while the compiled app keeps reporting its old version —
      # confirmed by building both ways locally and inspecting the binary.
      - name: Build Linux bundles
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version_override }}" ]; then
            jq --arg v "${{ inputs.version_override }}" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json.tmp
            mv /tmp/tauri.conf.json.tmp src-tauri/tauri.conf.json
          fi
          npm run tauri build -- --bundles deb,rpm,appimage --config '{"bundle":{"createUpdaterArtifacts":false}}'

      # linuxdeploy bundles libwayland-* (built on ubuntu-22.04). The host's
      # Mesa libEGL then loads those stale bundled wayland libs, breaking the
      # Wayland-EGL handshake → "EGL_BAD_PARAMETER. Aborting..." (issue #3,
      # confirmed fixed on Arch). Strip them so the AppImage uses host libwayland.
      # The GL/Mesa/gbm/drm/dri entries below are a defensive denylist — not
      # currently bundled, but cheap insurance if a future linuxdeploy adds them.
      - name: De-bundle graphics libs from AppImage
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          APP=$(ls *.AppImage | head -1)
          ./"$APP" --appimage-extract >/dev/null
          ( cd squashfs-root/usr/lib && rm -f \
              libwayland-client.so* libwayland-cursor.so* libwayland-egl.so* libwayland-server.so* \
              libEGL.so* libGL.so* libGLX.so* libGLdispatch.so* libOpenGL.so* \
              libGLESv2.so* libgbm.so* libdrm.so* libEGL_mesa.so* libgallium*.so* \
            && rm -rf dri/ )
          wget -qO /tmp/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          rm -f "$APP"
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool squashfs-root "$APP"
          rm -rf squashfs-root

      # Stripping+repacking above invalidates any signature Tauri computed at
      # build time, so sign the final bytes directly instead: `tauri signer
      # sign` reads the key/password from the environment and writes
      # "<file>.sig" next to it. Builds a standalone latest.json pointing at
      # this tag's AppImage so a test build of Kova (pointed at this tag via
      # a --config endpoint override) can exercise a real self-update
      # end-to-end before this lands in release.yml.
      - name: Sign repacked AppImage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          npm install -g @tauri-apps/cli@^2

          APPIMAGE_DIR="src-tauri/target/release/bundle/appimage"
          APP=$(ls "$APPIMAGE_DIR"/*.AppImage | head -1)
          APP_NAME=$(basename "$APP")

          tauri signer sign "$APP"

          VERSION="${{ inputs.version_override }}"
          [ -n "$VERSION" ] || VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ inputs.tag }}"
          # tauri-cli 2.11.4's "*.sig" file already contains the final
          # base64 string latest.json expects (confirmed by generating a
          # throwaway test keypair and inspecting the raw file) — re-encoding
          # it here would double-encode and produce a signature that fails
          # verification.
          SIG=$(cat "$APP.sig")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIG" \
            --arg url "$BASE_URL/$APP_NAME" \
            '{version: $version, notes: "AppImage auto-update prototype (issue #3)", pub_date: $pub_date,
              platforms: {"linux-x86_64": {signature: $sig, url: $url}}}' \
            > src-tauri/target/release/bundle/latest.json

      # Idempotent: a repeat run against the same tag (e.g. publishing a
      # version_override'd "new" build to test self-update) uploads/clobbers
      # into the existing release instead of failing on "already exists".
      - name: Publish pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle
          if gh release view "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "${{ inputs.tag }}" --repo "$GITHUB_REPOSITORY" --clobber \
              deb/*.deb rpm/*.rpm appimage/*.AppImage latest.json
          else
            gh release create "${{ inputs.tag }}" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Kova ${{ inputs.tag }} (Linux test build)" \
              --prerelease \
              --notes "Linux-only test build for issue #3. The AppImage has its over-bundled graphics libs (libEGL/Mesa/Wayland) stripped and repacked, then signed with the Tauri updater key. latest.json is included so this build can be used to test self-update in isolation (point a test build's updater endpoint at this tag)." \
              deb/*.deb rpm/*.rpm appimage/*.AppImage latest.json
          fi
