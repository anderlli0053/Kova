name: Linux Test Build

# Manually-triggered Linux-only build for sharing pre-release AppImages with
# issue reporters before a full release. Publishes as a pre-release so the
# download URL can be pasted directly into a GitHub issue.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Pre-release tag (e.g. v0.6.5-test.1)'
        required: true
        default: 'v0.6.5-test.1'

jobs:
  linux-test-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of 2026-05-15
        with:
          toolchain: stable

      - name: Cache Rust build artefacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ubuntu-22.04-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-22.04-cargo-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Linux pre-release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'Kova ${{ inputs.tag }} (Linux test build)'
          releaseBody: |
            **Linux-only test build — not a general release.**

            This build targets a specific bug fix and is intended for users
            affected by issue #3 (EGL initialisation failure on Wayland).
            Please report back in that issue whether this resolves the problem.
          releaseDraft: false
          prerelease: true

      - name: Fix AppImage — de-bundle libwayland (issue #3)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          APP=$(ls *.AppImage | head -1)
          ./"$APP" --appimage-extract >/dev/null
          rm -f squashfs-root/usr/lib/libwayland-*.so*
          wget -qO /tmp/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          rm -f "$APP"
          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool squashfs-root "$APP"
          gh release upload "${{ inputs.tag }}" "$APP" --clobber
