name: Test Build Attestation

# Manually-triggered sandbox for evaluating GitHub artifact attestations
# (issue #121 — establishing provenance so users can verify a release binary
# traces back to a specific commit/workflow run). Attests a throwaway file,
# not a real release artifact, so it can't affect release.yml or its signing
# secrets. Safe to delete once the approach is confirmed to work.
on:
  workflow_dispatch:

jobs:
  test-attestation:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Create dummy artifact
        run: |
          mkdir -p /tmp/attest-test
          echo "attestation test — ${{ github.sha }} — $(date -u +%FT%TZ)" > /tmp/attest-test/dummy.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: /tmp/attest-test/dummy.txt
